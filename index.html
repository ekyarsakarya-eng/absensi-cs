<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Absensi Karyawan Terpadu</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="icon" href="icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.06); }
    .btn { transition: all 0.2s; }
    .btn:active { transform: scale(0.96); }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 40px -10px rgba(14,165,233,0.3); }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white grid place-items-center p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-sky-900 via-slate-950 to-black">
  <div id="app" class="w-[360px] max-w-[calc(100%-2rem)]">
    <!-- LOGIN -->
    <div id="loginView" class="w-full glass rounded-[2rem] p-8 shadow-2xl border border-white/10">
      <div class="flex flex-col items-center mb-6">
        <img src="icon-192.png" class="w-20 h-20 rounded-2xl shadow-lg mb-3" alt="logo">
        <h1 class="text-2xl font-semibold">Absensi Karyawan Terpadu</h1>
      </div>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="text-sm text-white/70">Username</label>
          <input id="username" class="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none focus:ring-2 focus:ring-sky-500" required>
        </div>
        <div>
          <label class="text-sm text-white/70">Password</label>
          <input id="password" type="password" class="w-full mt-1 px-4 py-3 rounded-xl bg-white/10 border border-white/10 outline-none focus:ring-2 focus:ring-sky-500" required>
        </div>
        <button class="btn w-full py-3 rounded-xl bg-sky-500 hover:bg-sky-400 font-medium shadow-lg shadow-sky-900/30">Masuk</button>
        <p id="loginError" class="text-red-400 text-sm text-center hidden"></p>
      </form>
      <p id="appVersion" class="text-center text-xs text-white/40 mt-6">@v1.1 • SMG-2026</p>
    </div>

    <!-- HOME -->
    <div id="homeView" class="hidden w-full">
      <div class="glass rounded-[2rem] p-6 shadow-2xl border border-white/10 mb-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <img id="avatarHome" src="icon-192.png" class="w-12 h-12 rounded-xl bg-white/10 object-cover">
            <div>
              <h2 id="namaHome" class="font-semibold">-</h2>
              <p id="jamHome" class="text-xs text-sky-300 font-mono">--:--:--</p>
            </div>
          </div>
          <button id="logoutBtn" class="text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20">Keluar</button>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button id="cardAbsensi" class="card-hover btn glass rounded-[2rem] p-6 border border-white/10 flex flex-col items-center gap-3 transition-all">
          <img src="icon-absensi.png" class="w-16 h-16" alt="Absensi">
          <div class="text-center">
            <p class="font-medium">Absensi</p>
            <p class="text-xs text-white/50">Masuk & Pulang</p>
          </div>
        </button>
        <button id="cardRekap" class="card-hover btn glass rounded-[2rem] p-6 border border-white/10 flex flex-col items-center gap-3 transition-all">
          <img src="icon-rekap.png" class="w-16 h-16" alt="Rekap">
          <div class="text-center">
            <p class="font-medium">Rekap</p>
            <p class="text-xs text-white/50">Bulanan</p>
          </div>
        </button>
      </div>
    </div>

    <!-- ABSENSI VIEW -->
    <div id="absensiView" class="hidden w-full">
      <button class="mb-3 text-sm text-white/60 hover:text-white" data-back>← Kembali</button>
      <div class="glass rounded-[2rem] p-6 shadow-2xl border border-white/10">
        <div class="text-center">
          <p id="jam" class="text-5xl font-light tracking-wider">--:--:--</p>
          <p id="tanggal" class="text-white/60 mt-1">-</p>
        </div>
        <div class="grid grid-cols-2 gap-3 mt-6">
          <button id="btnIn" class="btn py-5 rounded-2xl bg-emerald-500/90 hover:bg-emerald-500 font-medium shadow-lg shadow-emerald-900/30 flex flex-col items-center">
            <span class="text-2xl mb-1">↑</span>Masuk
          </button>
          <button id="btnOut" class="btn py-5 rounded-2xl bg-rose-500/90 hover:bg-rose-500 font-medium shadow-lg shadow-rose-900/30 flex flex-col items-center">
            <span class="text-2xl mb-1">↓</span>Pulang
          </button>
        </div>
        <div class="mt-6 pt-6 border-t border-white/10 grid grid-cols-2 gap-4 text-center">
          <div><p class="text-xs text-white/50">Masuk</p><p id="timeIn" class="font-mono text-lg">-</p></div>
          <div><p class="text-xs text-white/50">Pulang</p><p id="timeOut" class="font-mono text-lg">-</p></div>
        </div>
        <p id="statusMsg" class="text-center text-sm mt-4 h-5 text-sky-300"></p>
      </div>
    </div>

    <!-- REKAP VIEW -->
    <div id="rekapView" class="hidden w-full">
      <button class="mb-3 text-sm text-white/60 hover:text-white" data-back>← Kembali</button>
      <div class="glass rounded-[2rem] p-6 shadow-2xl border border-white/10">
        <div class="flex items-center justify-between mb-4">
          <h3 id="rekapTitle" class="font-medium">Rekap Bulan Ini</h3>
          <button id="refreshBtn" class="text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20">Refresh</button>
        </div>
        <div class="max-h-[50vh] overflow-auto -mx-2 px-2">
          <table class="w-full text-sm">
            <thead class="sticky top-0 bg-slate-900/80 backdrop-blur text-white/60">
              <tr><th class="text-left p-2 font-normal">Tgl</th><th class="p-2 font-normal">Masuk</th><th class="p-2 font-normal">Pulang</th></tr>
            </thead>
            <tbody id="rekapBody"></tbody>
          </table>
        </div>
        <p id="totalKerja" class="text-center text-xs text-white/50 mt-4"></p>
      </div>
    </div>
  </div>

  <!-- CAMERA MODAL -->
  <div id="camModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50 p-4">
    <div class="w-full max-w-[360px] bg-slate-900 rounded-[2rem] overflow-hidden border border-white/10">
      <div class="aspect-[3/4] bg-black relative">
        <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>
      <div class="p-4 flex gap-3">
        <button id="cancelCam" class="flex-1 py-3 rounded-xl bg-white/10">Batal</button>
        <button id="snapBtn" class="flex-1 py-3 rounded-xl bg-sky-500 font-medium">Jepret & Absen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
