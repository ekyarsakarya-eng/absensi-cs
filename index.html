<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CleanSABSEN</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10b981">
<link rel="icon" href="icon-192.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent}
.glass{backdrop-filter:blur(12px);background:rgba(255,255,255,0.85);border:1px solid rgba(255,255,.5)}
.btn{transition:.2s}.btn:active{transform:scale(.97)}
.menu-active{background:#10b981;color:#fff}
.menu-item:hover{background:rgba(16,185,129,.1)}
#cameraModal video{transform:scaleX(-1)}
</style>
</head>
<body class="min-h-screen bg-gradient-to-b from-[#d1fae5] to-[#e0f2fe] text-slate-900">

<!-- INSTALL GATE OVERLAY -->
<div id="installGate" class="fixed inset-0 z-[9999] bg-slate-900 text-white hidden flex-col items-center justify-center p-6 text-center">
  <img src="icon-512.png" class="w-24 h-24 rounded-3xl mb-6 shadow-2xl">
  <h2 class="text-2xl font-bold mb-2">Install Absensi</h2>
  <p class="text-slate-300 mb-8 text-sm leading-relaxed">
    Aplikasi wajib diinstall ke HP untuk absen.<br>
    1x klik, langsung jadi app.
  </p>
  <button id="btnInstall" class="bg-emerald-600 px-8 py-4 rounded-2xl font-bold text-lg btn shadow-xl">
    Install Sekarang
  </button>
  <p class="text-xs text-slate-500 mt-6">Setelah install, buka dari icon di layar utama</p>
</div>

<!-- LOGIN -->
<div id="loginView" class="flex min-h-screen items-center justify-center p-4">
  <div class="w-full max-w-sm glass rounded- p-8 shadow-xl">
    <h1 class="text-3xl font-bold text-emerald-600 text-center mb-1">CleanSABSEN</h1>
    <p class="text-center text-xs text-slate-500 mb-6">Absensi Karyawan</p>
    <form id="loginForm" class="space-y-4">
      <input id="username" class="w-full px-4 py-3 rounded-2xl border-2 bg-slate-50" placeholder="Username" required>
      <div class="relative">
        <input id="password" type="password" class="w-full px-4 py-3 rounded-2xl border-2 bg-slate-50 pr-10" placeholder="Password" required>
        <button type="button" onclick="togglePass()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500"><i id="eyeIcon" class="fa-solid fa-eye"></i></button>
      </div>
      <button class="w-full py-3 rounded-2xl bg-emerald-600 text-white font-semibold btn">Masuk</button>
      <p id="err" class="text-red-600 text-xs text-center hidden"></p>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainView" class="hidden min-h-screen flex flex-col">
  <header class="glass border-b px-4 py-3 flex justify-between items-center sticky top-0 z-30">
    <div class="flex items-center gap-3">
      <img id="profilePic" src="https://i.pravatar.cc/80" class="w-8 h-8 rounded-full">
      <div>
        <div id="nameLabel" class="font-bold text-sm">-</div>
        <div id="digitalClock" class="font-mono text-xs text-slate-600"></div>
      </div>
    </div>
    <button onclick="logout()" class="text-rose-600"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
  </header>

  <main class="flex-1 p-4 pb-20 overflow-auto">
    <!-- PAGE ABSEN -->
    <div id="page-absen" class="page-content">
      <div class="glass rounded- p-6 text-center mb-4">
        <div id="digitalDate" class="text-xs text-slate-500 mb-2"></div>
        <div class="text-5xl font-bold font-mono mb-1" id="clockBig">00:00:00</div>
        <div id="statusMsg" class="text-xs text-slate-500 h-4"></div>
        <div class="grid grid-cols-2 gap-4 mt-4 text-sm">
          <div><div class="text-xs text-slate-500">Masuk</div><div id="timeIn" class="font-bold">-</div></div>
          <div><div class="text-xs text-slate-500">Pulang</div><div id="timeOut" class="font-bold">-</div></div>
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-3">
        <button id="btnIn" class="py-6 rounded-2xl bg-emerald-600 text-white font-bold text-lg btn shadow-lg">Masuk</button>
        <button id="btnOut" class="py-6 rounded-2xl bg-rose-500 text-white font-bold text-lg btn shadow-lg opacity-40">Pulang</button>
      </div>
    </div>

    <!-- PAGE REKAP -->
    <div id="page-rekap" class="page-content hidden">
      <h2 class="text-xl font-bold mb-3">Rekap Absensi</h2>
      <div id="rekapList" class="space-y-2"></div>
    </div>

    <!-- PAGE PROFIL -->
    <div id="page-profil" class="page-content hidden">
      <div class="glass rounded-2xl p-6 text-center mb-4">
        <img id="profilePicBig" src="https://i.pravatar.cc/80" class="w-20 h-20 rounded-full mx-auto mb-3">
        <div id="profileName" class="font-bold text-lg">-</div>
        <div id="profileUsername" class="text-xs text-slate-500">@-</div>
      </div>
      <form id="formProfil" class="space-y-3">
        <input id="editNama" class="w-full px-4 py-3 rounded-2xl border-2 bg-slate-50" placeholder="Nama Lengkap">
        <input id="editNoHP" class="w-full px-4 py-3 rounded-2xl border-2 bg-slate-50" placeholder="No HP">
        <input id="editAlamat" class="w-full px-4 py-3 rounded-2xl border-2 bg-slate-50" placeholder="Alamat">
        <button class="w-full py-3 rounded-2xl bg-emerald-600 text-white font-semibold btn">Simpan</button>
      </form>
    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="fixed bottom-0 left-0 right-0 glass border-t grid grid-cols-3 py-2">
    <button onclick="switchPage('absen')" class="menu-item flex flex-col items-center gap-1 py-2 menu-active"><i class="fa-solid fa-camera"></i><span class="text-">Absen</span></button>
    <button onclick="switchPage('rekap')" class="menu-item flex flex-col items-center gap-1 py-2"><i class="fa-solid fa-calendar-days"></i><span class="text-">Rekap</span></button>
    <button onclick="switchPage('profil')" class="menu-item flex flex-col items-center gap-1 py-2"><i class="fa-solid fa-user"></i><span class="text-">Profil</span></button>
  </nav>
</div>

<!-- CAMERA MODAL -->
<div id="cameraModal" class="fixed inset-0 z-50 bg-black hidden flex-col">
  <video id="video" autoplay playsinline muted class="w-full h-full object-cover"></video>
  <canvas id="canvas" class="hidden"></canvas>
  <img id="preview" class="hidden w-full h-full object-cover">
  <input type="file" id="fileInput" accept="image/*" capture="user" class="hidden">
  <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black/80 to-transparent">
    <div class="flex justify-center gap-4">
      <button id="btnCapture" class="w-16 h-16 rounded-full bg-white"></button>
      <button id="btnRetake" class="hidden px-6 py-3 rounded-2xl bg-slate-600 text-white">Ulangi</button>
      <button id="btnSubmit" class="hidden px-6 py-3 rounded-2xl bg-emerald-600 text-white font-bold">Kirim</button>
    </div>
    <button onclick="closeCamera()" class="absolute top-4 right-4 text-white text-2xl">×</button>
  </div>
</div>

<div id="loadingOverlay" class="fixed inset-0 z-[9998] bg-black/50 hidden items-center justify-center"><i class="fa-solid fa-spinner fa-spin text-white text-4xl"></i></div>
<div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm hidden z-[9997]"></div>

<script src="app.js"></script>
</body>
</html>
